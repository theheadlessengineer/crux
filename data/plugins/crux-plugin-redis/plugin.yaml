apiVersion: crux/v1
kind: Plugin
metadata:
  name: crux-plugin-redis
  version: 1.0.0
  description: Redis integration with caching, distributed lock (Redlock), and TTL strategy
  author: Platform Engineering
  trustTier: 1
  tags: [cache, redis, redlock]
  cruxVersionConstraint: ">=1.0.0"
spec:
  questions:
    - id: redis_distributed_lock
      type: confirm
      prompt: "Enable Redlock distributed locking?"
      help: "Generates a Redlock client for distributed mutual exclusion across multiple Redis nodes. Use this when you need to coordinate work across service instances (e.g. scheduled jobs, inventory reservations)."
      default: "false"
    - id: redis_ttl_strategy
      type: select
      prompt: "Default cache TTL strategy?"
      help: "fixed sets a constant expiry on every write; sliding resets the TTL on each read, keeping hot keys alive; none omits a default TTL so keys must be expired explicitly per call-site."
      options: ["fixed", "sliding", "none"]
      default: "fixed"
  templates:
    - internal/infrastructure/redis/redis.go.tmpl
    - internal/infrastructure/redis/health.go.tmpl
  templates_by_language:
    python:
      - app/cache/redis.py.tmpl
    java:
      - src/main/java/infrastructure/redis/RedisConfig.java.tmpl
    node:
      - src/cache/redis.js.tmpl
  hooks:
    preGenerate: []
    postGenerate: []
  dependencies: []
