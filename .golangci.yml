version: "2"

run:
  timeout: 5m
  go: "1.26"
  tests: true
  modules-download-mode: readonly

linters:
  default: none

  enable:
    # --- correctness ---
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # --- code quality ---
    - revive
    - gocritic
    - cyclop
    - dupl

    # --- security ---
    - gosec

    # --- style / formatting ---
    - gofmt
    - goimports
    - misspell

    # --- maintainability ---
    - unconvert
    - unparam
    - prealloc

linters-settings:

  cyclop:
    max-complexity: 15

  revive:
    rules:
      - name: line-length-limit
        arguments: [120]
      - name: var-naming
      - name: indent-error-flow
      - name: error-return

  govet:
    enable:
      - shadow

  goimports:
    local-prefixes: github.com/theheadlessengineer/crux

  dupl:
    threshold: 120

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

issues:

  max-issues-per-linter: 50
  max-same-issues: 10

  exclude-rules:

    # Generated files
    - path: ".*\\.pb\\.go"
      linters:
        - all

    - path: ".*_gen\\.go"
      linters:
        - all

    # Test files often duplicate logic
    - path: "_test\\.go"
      linters:
        - dupl
        - gosec

output:
  formats:
    colored-line-number:
      path: stdout

  print-issued-lines: true
  print-linter-name: true