version: "2"

run:
  timeout: 5m
  go: "1.26"
  tests: true
  modules-download-mode: readonly

linters:
  default: none

  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - revive
    - gocritic
    - cyclop
    - dupl
    - gosec
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - prealloc

  settings:
    cyclop:
      max-complexity: 15

    revive:
      rules:
        - name: line-length-limit
          arguments: [120]
        - name: var-naming
        - name: indent-error-flow
        - name: error-return

    govet:
      enable:
        - shadow

    dupl:
      threshold: 120

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

  exclusions:
    rules:
      - path: ".*\\.pb\\.go"
        linters:
          - dupl
          - revive
          - gocritic

      - path: ".*_gen\\.go"
        linters:
          - dupl
          - revive
          - gocritic

      - path: "_test\\.go"
        linters:
          - dupl
          - gosec

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    text:
      path: stdout