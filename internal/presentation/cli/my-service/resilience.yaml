# resilience.yaml — generated by crux
# All values are overridable. Review before going to production.
# When a service mesh is present (mesh_mode: true), circuit breaker and retry
# are handled at the mesh layer; in-app values are ignored for HTTP calls.

service: my-service
mesh_mode: false  # Set to true when a service mesh (e.g. Istio) is selected.

timeout:
  # Default outbound call timeout in milliseconds.
  defaultMs: 5000

retry:
  # Maximum number of attempts (1 = no retry).
  maxAttempts: 3
  # "exponential" or "fixed"
  backoffType: exponential
  # Initial backoff interval in milliseconds.
  initialIntervalMs: 100
  # Maximum backoff interval in milliseconds.
  maxIntervalMs: 1000

circuitBreaker:
  # Percentage of failed calls that opens the circuit (0–100).
  failureRateThreshold: 50
  # Percentage of slow calls that opens the circuit (0–100).
  slowCallRateThreshold: 100
  # Minimum number of calls before the circuit breaker evaluates the threshold.
  minimumCallCount: 10
  # How long (ms) the circuit stays open before moving to half-open.
  openStateWaitDurationMs: 60000

bulkhead:
  # Maximum number of concurrent outbound calls allowed.
  maxConcurrentCalls: 20
