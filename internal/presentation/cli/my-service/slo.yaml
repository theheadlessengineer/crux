# slo.yaml — generated by crux
# Define your service level objectives here.
# These values are referenced by alerts.yaml for consistent thresholds.
# Review and calibrate before going to production.

service: my-service

slos:
  # Availability SLO — percentage of successful requests over the window.
  - name: availability
    # Target availability percentage (e.g. 99.9 = three nines).
    target: 99.9
    # Measurement window in days.
    window: 30d
    # Policy when error budget is exhausted: halt_deployments_on_exhaustion | alert_only
    error_budget_policy: halt_deployments_on_exhaustion

  # Latency SLO — p99 response time target.
  - name: latency-p99
    # Target p99 latency in milliseconds.
    target_ms: 500
    window: 30d
    percentile: 99
