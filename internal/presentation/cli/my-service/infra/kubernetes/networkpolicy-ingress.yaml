apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: my-service-deny-ingress
  namespace: my-service
spec:
  podSelector:
    matchLabels:
      app: my-service
  policyTypes:
    - Ingress
  ingress: []
