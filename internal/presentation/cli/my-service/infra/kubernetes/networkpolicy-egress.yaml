apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: my-service-deny-egress
  namespace: my-service
spec:
  podSelector:
    matchLabels:
      app: my-service
  policyTypes:
    - Egress
  egress:
    # DNS is always permitted — required for service discovery.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
