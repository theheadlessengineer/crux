version: "3.9"

services:
  my-service:
    build:
      context: .
      args:
        VERSION: dev
    ports:
      - "8080:8080"
    environment:
      SERVICE_NAME: my-service
      ENVIRONMENT: development
      PORT: "8080"
      LOG_LEVEL: debug
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
